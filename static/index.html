<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sketchroom — Draw Together</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0d;
    --paper: #f5f0e8;
    --accent: #0c6781;
    --accent2: #1c6eff;
    --muted: #9e9a93;
    --border: #ddd8ce;
    --canvas-bg: #ffffff;
    --toolbar-h: 56px;
    --status-h: 26px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: rgb(250, 216, 241);
    color: var(--ink);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* ─── LANDING ─── */
  #landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    gap: 0;
    position: relative;
    overflow: hidden;
    padding: 16px;
  }

  #landing::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity: 0.4;
    pointer-events: none;
  }

  .landing-logo {
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.25em;
    color: #0f0e0d;
    text-transform: uppercase;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .landing-title {
    font-size: clamp(36px, 10vw, 96px);
    font-weight: 800;
    line-height: 0.9;
    letter-spacing: -0.03em;
    text-align: center;
    position: relative;
    z-index: 1;
    margin-bottom: 12px;
  }

  .landing-title span { color: var(--accent); display: inline-block; transform: rotate(-2deg); }

  .landing-sub {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #0f0e0d;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .landing-card {
    background: rgb(212, 180, 212);
    border: 2px solid var(--ink);
    padding: 28px 32px;
    width: min(480px, 100%);
    position: relative;
    z-index: 1;
    box-shadow: 6px 6px 0 var(--ink);
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0f0e0d;
    margin-bottom: 10px;
  }

  .input-row { display: flex; gap: 8px; margin-bottom: 20px; }

  .input-field {
    flex: 1;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 14px;
    border: 2px solid var(--border);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }

  .input-field:focus { border-color: var(--ink); }
  .input-field::placeholder { color: var(--muted); font-weight: 400; }
  .input-field.code { text-transform: uppercase; letter-spacing: 0.15em; font-family: 'Space Mono', monospace; font-size: 16px; }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 20px;
    border: 2px solid var(--ink);
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn-secondary { background: white; color: var(--ink); }
  .btn-secondary:hover { background: var(--accent2); border-color: var(--accent2); color: white; }
  .btn:active { transform: translate(2px, 2px); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0; color: #0f0e0d;
    font-family: 'Space Mono', monospace; font-size: 11px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .error-msg {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--accent);
    margin-top: -12px; margin-bottom: 8px; min-height: 16px;
  }

  /* ─── WHITEBOARD ─── */
  #whiteboard { display: none; flex-direction: column; height: 100vh; height: 100dvh; }

  /* ─── TOOLBAR ─── */
  .toolbar {
    height: auto;
    min-height: var(--toolbar-h);
    background: var(--ink);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 4px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    overflow-x: auto;
    overflow-y: hidden;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
  }

  .toolbar::-webkit-scrollbar { display: none; }

  .toolbar-brand {
    font-size: 13px;
    font-weight: 800;
    color: white;
    letter-spacing: -0.01em;
    margin-right: 2px;
    flex-shrink: 0;
  }
  .toolbar-brand span { color: var(--accent); }

  .room-badge {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--muted); background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 3px 8px; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    margin-right: 2px; position: relative;
    white-space: nowrap;
  }
  .room-badge:hover { background: rgba(255,255,255,0.13); color: white; }

  .tool-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.12); flex-shrink: 0; margin: 0 1px; }

  .tool-btn {
    height: 32px;
    padding: 0 8px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent; color: var(--muted);
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 13px;
    transition: all 0.12s; flex-shrink: 0;
    gap: 4px;
    white-space: nowrap;
    border-radius: 2px;
  }

  .tool-btn.icon-only { width: 32px; padding: 0; }

  .tool-btn:hover, .tool-btn.active { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.35); }
  .tool-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .tool-btn.danger:hover { background: #e74c3c; border-color: #e74c3c; color: white; }
  .tool-btn.exit-btn { background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.4); color: #e74c3c; }
  .tool-btn.exit-btn:hover { background: #e74c3c; border-color: #e74c3c; color: white; }

  .tool-btn.voice-on { background: #2ecc71; border-color: #2ecc71; color: white; animation: voicePulse 1.5s infinite; }
  @keyframes voicePulse { 0%,100%{box-shadow:0 0 0 0 rgba(46,204,113,0.5)} 50%{box-shadow:0 0 0 6px rgba(46,204,113,0)} }

  .color-swatch {
    width: 22px; height: 22px;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer; flex-shrink: 0;
    transition: transform 0.1s;
    border-radius: 2px;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: white; outline: 2px solid white; outline-offset: 2px; }

  #colorPicker { position: absolute; opacity: 0; width: 0; height: 0; }

  .custom-color-btn {
    width: 22px; height: 22px;
    border: 2px dashed rgba(255,255,255,0.3);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--muted); flex-shrink: 0; transition: all 0.12s;
    border-radius: 2px;
  }
  .custom-color-btn:hover { border-color: white; color: white; }

  .size-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .size-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.1em; }
  #sizeSlider { -webkit-appearance: none; width: 60px; height: 4px; background: rgba(255,255,255,0.15); outline: none; cursor: pointer; }
  #sizeSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: white; cursor: pointer; border-radius: 0; }
  .size-val { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.6); width: 18px; text-align: right; }

  .toolbar-spacer { flex: 1; min-width: 4px; }

  .users-indicator {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--muted); display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .users-dot { width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Canvas */
  #canvasWrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--canvas-bg);
    margin-bottom: var(--status-h);
  }

  #mainCanvas {
    display: block;
    cursor: crosshair;
    touch-action: none;
    width: 100%;
    height: 100%;
  }

  /* Status bar */
  #statusBar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--status-h); background: var(--ink);
    display: flex; align-items: center; padding: 0 12px; gap: 14px; z-index: 9;
    overflow: hidden;
  }
  .status-item { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.05em; white-space: nowrap; }
  .status-item span { color: rgba(255,255,255,0.7); }

  /* Drawing bubble */
  .draw-bubble {
    position: absolute; font-family: 'Space Mono', monospace; font-size: 10px;
    background: var(--ink); color: white; padding: 3px 8px;
    pointer-events: none; white-space: nowrap;
    transform: translate(-50%, -140%); opacity: 0; transition: opacity 0.2s; z-index: 5;
  }
  .draw-bubble.visible { opacity: 1; }

  /* Copied tip */
  .copied-tip {
    font-family: 'Space Mono', monospace; font-size: 10px;
    background: #2ecc71; color: var(--ink); padding: 2px 8px;
    position: absolute; top: -28px; left: 50%;
    transform: translateX(-50%); pointer-events: none; opacity: 0; transition: opacity 0.2s;
    white-space: nowrap;
  }
  .copied-tip.show { opacity: 1; }

  /* Toast */
  #toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--ink); color: white;
    font-family: 'Space Mono', monospace; font-size: 12px;
    padding: 10px 20px; border: 2px solid rgba(255,255,255,0.15);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); z-index: 200; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── CHAT PANEL ─── */
  #chatWidget {
    position: fixed;
    bottom: var(--status-h);
    right: 12px;
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  #chatPanel {
    width: min(300px, calc(100vw - 24px));
    height: min(380px, 50vh);
    background: var(--ink);
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: -4px -4px 0 rgba(255,255,255,0.05);
    transform-origin: bottom right;
    animation: chatOpen 0.2s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes chatOpen {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .chat-header {
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-header-title { font-family: 'Space Mono', monospace; font-size: 11px; color: white; letter-spacing: 0.1em; text-transform: uppercase; }
  .chat-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; transition: color 0.1s; }
  .chat-close:hover { color: white; }

  #chatMessages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth;
  }
  #chatMessages::-webkit-scrollbar { width: 3px; }
  #chatMessages::-webkit-scrollbar-track { background: transparent; }
  #chatMessages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

  .chat-msg { display: flex; flex-direction: column; gap: 2px; max-width: 85%; }
  .chat-msg.own { align-self: flex-end; align-items: flex-end; }
  .chat-msg.other { align-self: flex-start; align-items: flex-start; }
  .chat-msg-user { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.05em; }
  .chat-msg-bubble { padding: 7px 11px; font-size: 13px; line-height: 1.4; word-break: break-word; }
  .chat-msg.own .chat-msg-bubble { background: var(--accent); color: white; }
  .chat-msg.other .chat-msg-bubble { background: rgba(255,255,255,0.1); color: white; }
  .chat-msg-time { font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.2); }
  .chat-system-msg { text-align: center; font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.25); padding: 2px 0; }

  .chat-input-row { display: flex; border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
  #chatInput { flex: 1; background: transparent; border: none; outline: none; color: white; font-family: 'Syne', sans-serif; font-size: 13px; padding: 10px 12px; min-width: 0; }
  #chatInput::placeholder { color: rgba(255,255,255,0.25); }
  #chatSend { background: var(--accent); border: none; color: white; cursor: pointer; padding: 0 14px; font-size: 14px; transition: background 0.1s; flex-shrink: 0; }
  #chatSend:hover { background: #0a5570; }

  #chatToggle {
    width: 44px; height: 44px; background: var(--ink);
    border: 2px solid rgba(255,255,255,0.2); color: white; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; position: relative; flex-shrink: 0;
    border-radius: 4px;
  }
  #chatToggle:hover { background: rgba(15,14,13,0.85); border-color: rgba(255,255,255,0.4); }

  #chatUnread {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px; background: var(--accent); border-radius: 50%;
    font-family: 'Space Mono', monospace; font-size: 10px; color: white;
    display: none; align-items: center; justify-content: center;
  }
  #chatUnread.show { display: flex; }

  /* ─── VOICE PANEL ─── */
  #voiceBar {
    position: fixed;
    bottom: calc(var(--status-h) + 60px);
    right: 12px;
    background: var(--ink);
    border: 2px solid rgba(255,255,255,0.15);
    padding: 8px 12px;
    display: none;
    gap: 8px;
    align-items: center;
    z-index: 99;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    border-radius: 4px;
    max-width: calc(100vw - 24px);
    flex-wrap: wrap;
  }
  #voiceBar.visible { display: flex; }
  .voice-user { display: flex; align-items: center; gap: 5px; color: white; }
  .voice-user-dot { width: 7px; height: 7px; background: #2ecc71; border-radius: 50%; }

  /* ─── MOBILE ─── */
  @media (max-width: 600px) {
    .toolbar { padding: 0 6px; gap: 3px; }
    .toolbar-brand { font-size: 11px; }
    .size-wrap { display: none; }
    .tool-sep { margin: 0; }
    #statusBar { gap: 8px; padding: 0 8px; }
    .status-item { font-size: 9px; }
  }
</style>
</head>
<body>

<!-- ═══════════ LANDING ═══════════ -->
<div id="landing">
  <canvas id="heartsCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0"></canvas>
  <div class="landing-logo" style="z-index:1">✦ Collaborative Canvas</div>
  <h1 class="landing-title">Sketch<span>room</span></h1>
  <p class="landing-sub">Pret n Jia | have funnn</p>
  <div class="landing-card">
    <div class="section-label">Your name</div>
    <div class="input-row" style="margin-bottom:24px">
      <input class="input-field" id="usernameInput" placeholder="e.g. Pret n Jia" maxlength="20" />
    </div>
    <div class="section-label">Create a new room</div>
    <div class="input-row">
      <button class="btn btn-primary" style="width:100%" onclick="createRoom()">Create Room →</button>
    </div>
    <div class="divider">or join existing</div>
    <div class="section-label">Room code</div>
    <div class="input-row">
      <input class="input-field code" id="roomCodeInput" placeholder="ABC123" maxlength="6" />
      <button class="btn btn-secondary" onclick="joinRoom()">Join</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ═══════════ WHITEBOARD ═══════════ -->
<div id="whiteboard">
  <div class="toolbar">
    <div class="toolbar-brand">Sketch<span>room</span></div>

    <div class="room-badge" id="roomBadge" title="Click to copy" onclick="copyRoomCode()">
      ——
      <div class="copied-tip" id="copiedTip">copied!</div>
    </div>

    <div class="tool-sep"></div>

    <button class="tool-btn icon-only active" id="btnPen" title="Pen" onclick="selectTool('pen')">✏️</button>
    <button class="tool-btn icon-only" id="btnEraser" title="Eraser" onclick="selectTool('eraser')">⬜</button>
    <button class="tool-btn icon-only" title="Undo (Ctrl+Z)" onclick="undo()">↩</button>
    <button class="tool-btn icon-only" title="Redo (Ctrl+Y)" onclick="redo()">↪</button>
    <button class="tool-btn icon-only danger" title="Clear canvas" onclick="clearCanvas()">✕</button>

    <div class="tool-sep"></div>

    <div style="display:flex;gap:3px;align-items:center;flex-shrink:0">
      <div class="color-swatch selected" style="background:#0f0e0d" data-color="#0f0e0d" onclick="selectColor(this)"></div>
      <div class="color-swatch" style="background:#ff4d1c" data-color="#ff4d1c" onclick="selectColor(this)"></div>
      <div class="color-swatch" style="background:#1c6eff" data-color="#1c6eff" onclick="selectColor(this)"></div>
      <div class="color-swatch" style="background:#2ecc71" data-color="#2ecc71" onclick="selectColor(this)"></div>
      <div class="color-swatch" style="background:#f7c325" data-color="#f7c325" onclick="selectColor(this)"></div>
      <div class="color-swatch" style="background:#e91e8c" data-color="#e91e8c" onclick="selectColor(this)"></div>
      <button class="custom-color-btn" title="Custom color" onclick="document.getElementById('colorPicker').click()">+</button>
      <input type="color" id="colorPicker" value="#0f0e0d" onchange="setCustomColor(this.value)" />
    </div>

    <div class="tool-sep"></div>

    <div class="size-wrap">
      <span class="size-label">SZ</span>
      <input type="range" id="sizeSlider" min="1" max="50" value="3" oninput="changeSize(this.value)" />
      <span class="size-val" id="sizeVal">3</span>
    </div>

    <div class="tool-sep"></div>

    <!-- Voice button — clear label + icon -->
    <button class="tool-btn" id="btnVoice" title="Join voice chat" onclick="toggleVoice()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 16.93A8.001 8.001 0 0 1 4 10H2a10 10 0 0 0 9 9.95V22h2v-2.05A10 10 0 0 0 22 10h-2a8 8 0 0 1-6.5 7.93z"/>
      </svg>
      <span id="voiceBtnLabel">Voice</span>
    </button>

    <div class="toolbar-spacer"></div>

    <div class="users-indicator">
      <div class="users-dot"></div>
      <span id="userCount">1</span>
    </div>

    <div class="tool-sep"></div>

    <button class="tool-btn exit-btn" title="Exit room" onclick="exitRoom()">✖ Exit</button>
  </div>

  <div id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
  </div>

  <div id="statusBar">
    <div class="status-item">user: <span id="sbUser">—</span></div>
    <div class="status-item">tool: <span id="sbTool">pen</span></div>
    <div class="status-item">size: <span id="sbSize">3</span></div>
    <div class="status-item" id="sbDrawing" style="color:#2ecc71;display:none">● drawing</div>
  </div>
</div>

<!-- ═══════════ CHAT WIDGET ═══════════ -->
<div id="chatWidget">
  <div id="chatPanel" style="display:none">
    <div class="chat-header">
      <span class="chat-header-title">💬 Room Chat</span>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>
    <div id="chatMessages"></div>
    <div class="chat-input-row">
      <input id="chatInput" placeholder="Say something..." maxlength="300" />
      <button id="chatSend" onclick="sendChat()">→</button>
    </div>
  </div>
  <button id="chatToggle" onclick="toggleChat()" title="Chat">
    💬
    <div id="chatUnread"></div>
  </button>
</div>

<div id="voiceBar">
  <span>🎙️ in voice:</span>
  <div id="voiceUsers"></div>
</div>

<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────
let ws = null;
let username = '';
let roomCode = '';
let currentColor = '#0f0e0d';
let penSize = 3;
let eraserSize = 18;
let toolMode = 'pen';

let isDrawing = false;
let lastX = 0, lastY = 0;
let currentStrokeId = null;
let currentStroke = [];

let ownStrokes = {};
let undoneStrokes = {};
let otherStrokes = {};
let undoStack = [];
let redoStack = [];

let drawingBubbles = {};
let drawingTimers = {};

let chatOpen = false;
let unreadCount = 0;

// ─── WebRTC Voice ─────────────────────────────────────────────────────
let localStream = null;
let peerConnections = {};
let voiceOn = false;
let voiceUsers = new Set();

const iceConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    {
      urls: 'turn:a.relay.metered.ca:80',
      username: '8142f9a34b1ed2cf751445g7',
      credential: 'hehehaha'
    },
    {
      urls: 'turn:a.relay.metered.ca:443',
      username: '8142f9a34b1ed2cf751445g7',
      credential: 'hehehaha'
    },
    {
      urls: 'turns:a.relay.metered.ca:443?transport=tcp',
      username: '8142f9a34b1ed2cf751445g7',
      credential: 'hehehaha'
    }
  ]
};

// ─── Floating Hearts ─────────────────────────────────────────────────
const HEART_COLORS = ['#ff4d1c','#e91e8c','#ff6b6b','#ff9f43','#ff4757','#fd79a8','#e84393','#ff3f81'];

function initHearts() {
  const canvas = document.getElementById('heartsCanvas');
  const ctx = canvas.getContext('2d');
  const hearts = [];

  function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 18; i++) {
    hearts.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height + canvas.height,
      size: 14 + Math.random() * 16,
      speed: 0.8 + Math.random() * 0.7,
      color: HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)],
      opacity: 0.15 + Math.random() * 0.45,
      drift: (Math.random() - 0.5) * 0.4,
      rotSpeed: (Math.random() - 0.5) * 0.01,
      angle: 0
    });
  }

  function drawHeart(ctx, x, y, size, color, opacity, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = opacity;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.3);
    ctx.bezierCurveTo(size * 0.5, -size * 0.9, size, -size * 0.3, 0, size * 0.5);
    ctx.bezierCurveTo(-size, -size * 0.3, -size * 0.5, -size * 0.9, 0, -size * 0.3);
    ctx.fill();
    ctx.restore();
  }

  function animate() {
    if (document.getElementById('landing').style.display !== 'none') {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const h of hearts) {
        h.y -= h.speed;
        h.x += h.drift;
        h.angle += h.rotSpeed;
        if (h.y < -40) {
          h.y = canvas.height + 40;
          h.x = Math.random() * canvas.width;
        }
        drawHeart(ctx, h.x, h.y, h.size, h.color, h.opacity, h.angle);
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
}

initHearts();

// ─── Landing ─────────────────────────────────────────────────────────
document.getElementById('usernameInput').addEventListener('keydown', e => { if (e.key === 'Enter') createRoom(); });
document.getElementById('roomCodeInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });
document.getElementById('roomCodeInput').addEventListener('input', e => { e.target.value = e.target.value.toUpperCase(); });

function getUsername() {
  const u = document.getElementById('usernameInput').value.trim();
  if (!u) { showError('Enter a username first'); document.getElementById('usernameInput').focus(); return null; }
  return u;
}

async function createRoom() {
  const u = getUsername();
  if (!u) return;
  username = u;
  try {
    const res = await fetch('/create-room');
    const data = await res.json();
    enterWhiteboard(data.room_code);
  } catch { showError('Server unreachable'); }
}

async function joinRoom() {
  const u = getUsername();
  if (!u) return;
  username = u;
  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if (!code || code.length !== 6) { showError('Enter a valid 6-character room code'); return; }
  try {
    const res = await fetch(`/room-exists/${code}`);
    const data = await res.json();
    if (!data.exists) { showError(`Room "${code}" not found`); return; }
    enterWhiteboard(code);
  } catch { showError('Server unreachable'); }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function enterWhiteboard(code) {
  roomCode = code;
  document.getElementById('landing').style.display = 'none';
  document.getElementById('whiteboard').style.display = 'flex';
  document.getElementById('chatWidget').style.display = 'flex';
  document.getElementById('roomBadge').childNodes[0].textContent = roomCode;
  document.getElementById('sbUser').textContent = username;
  resizeCanvas();
  connectWS();
}

function exitRoom() {
  if (!confirm('Leave this room?')) return;
  if (voiceOn) leaveVoice();
  if (ws) { ws.close(); ws = null; }

  // Reset all state
  ownStrokes = {}; undoneStrokes = {}; otherStrokes = {};
  undoStack = []; redoStack = [];
  voiceUsers.clear();
  chatOpen = false;
  unreadCount = 0;

  // Reset UI
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('chatPanel').style.display = 'none';
  document.getElementById('voiceBar').classList.remove('visible');
  document.getElementById('voiceUsers').innerHTML = '';
  document.getElementById('sbDrawing').style.display = 'none';
  document.getElementById('whiteboard').style.display = 'none';
  document.getElementById('chatWidget').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  updateUnread();
}

// ─── Canvas ───────────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

function resizeCanvas() {
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  ctx.putImageData(img, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}
window.addEventListener('resize', resizeCanvas);

// ─── WebSocket ────────────────────────────────────────────────────────
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${protocol}://${location.host}/ws/${roomCode}/${encodeURIComponent(username)}`);
  ws.onopen = () => showToast('Connected ✓');
  ws.onclose = () => showToast('Disconnected');
  ws.onerror = () => showToast('Connection error');
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'draw':
      if (msg.username !== username) {
        if (!otherStrokes[msg.username]) otherStrokes[msg.username] = {};
        if (!otherStrokes[msg.username][msg.stroke_id]) otherStrokes[msg.username][msg.stroke_id] = [];
        otherStrokes[msg.username][msg.stroke_id].push(msg);
        drawLine(msg);
        showDrawingBubble(msg.username, msg.x2, msg.y2);
      }
      break;

    case 'undo':
      if (msg.username !== username) {
        if (otherStrokes[msg.username]) delete otherStrokes[msg.username][msg.stroke_id];
        redrawAll();
      }
      break;

    case 'clear':
      canvas.width = canvas.width;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      otherStrokes = {}; ownStrokes = {}; undoStack = []; redoStack = []; undoneStrokes = {};
      break;

    case 'join':
      showToast(`${msg.username} joined`);
      addSystemMsg(`${msg.username} joined the room`);
      updateUserCount(msg.user_count);
      if (voiceOn && msg.username !== username) initiateVoiceCall(msg.username);
      break;

    case 'leave':
      showToast(`${msg.username} left`);
      addSystemMsg(`${msg.username} left`);
      updateUserCount(msg.user_count);
      closeVoicePeer(msg.username);
      voiceUsers.delete(msg.username);
      updateVoiceBar();
      break;

    case 'user_count':
      updateUserCount(msg.user_count);
      break;

    case 'status':
      if (msg.username !== username) {
        const sb = document.getElementById('sbDrawing');
        if (msg.status === 'drawing') { sb.style.display = 'block'; sb.textContent = `● ${msg.username} drawing`; }
        else sb.style.display = 'none';
      }
      break;

    case 'chat':
      appendChatMsg(msg.username, msg.text, msg.time, msg.own || false);
      if (!chatOpen) { unreadCount++; updateUnread(); }
      break;

    case 'webrtc-offer': handleOffer(msg.from, msg.sdp); break;
    case 'webrtc-answer': handleAnswer(msg.from, msg.sdp); break;
    case 'webrtc-ice': handleIce(msg.from, msg.candidate); break;

    case 'voice-join':
      voiceUsers.add(msg.username);
      updateVoiceBar();
      showToast(`${msg.username} joined voice`);
      if (voiceOn) initiateVoiceCall(msg.username);
      break;

    case 'voice-leave':
      voiceUsers.delete(msg.username);
      closeVoicePeer(msg.username);
      updateVoiceBar();
      showToast(`${msg.username} left voice`);
      break;
  }
}

function updateUserCount(n) {
  document.getElementById('userCount').textContent = `${n}`;
}

// ─── Drawing ──────────────────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = getPos(e);
  lastX = pos.x; lastY = pos.y;
  currentStroke = [];
  currentStrokeId = crypto.randomUUID();
  send({ type: 'status', username, status: 'drawing' });
}

function onDraw(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const pos = getPos(e);
  const color = toolMode === 'eraser' ? '#ffffff' : currentColor;
  const width = toolMode === 'eraser' ? eraserSize : penSize;
  const line = { type: 'draw', x1: lastX, y1: lastY, x2: pos.x, y2: pos.y, color, width, username, stroke_id: currentStrokeId };
  drawLine(line);
  currentStroke.push(line);
  send(line);
  lastX = pos.x; lastY = pos.y;
}

function stopDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;
  if (currentStroke.length) { ownStrokes[currentStrokeId] = currentStroke; undoStack.push(currentStrokeId); redoStack = []; }
  currentStroke = []; currentStrokeId = null;
  send({ type: 'status', username, status: 'idle' });
  document.getElementById('sbDrawing').style.display = 'none';
}

function drawLine(line) {
  ctx.beginPath();
  ctx.moveTo(line.x1, line.y1);
  ctx.lineTo(line.x2, line.y2);
  ctx.strokeStyle = line.color;
  ctx.lineWidth = line.width;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.stroke();
}

function redrawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const sid of undoStack) { const s = ownStrokes[sid]; if (s) s.forEach(drawLine); }
  for (const u of Object.values(otherStrokes)) for (const s of Object.values(u)) s.forEach(drawLine);
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', onDraw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', onDraw, { passive: false });
canvas.addEventListener('touchend', stopDraw);

// ─── Undo/Redo ────────────────────────────────────────────────────────
function undo() {
  if (!undoStack.length) return;
  const sid = undoStack.pop(); redoStack.push(sid);
  undoneStrokes[sid] = ownStrokes[sid]; delete ownStrokes[sid];
  send({ type: 'undo', stroke_id: sid, username }); redrawAll();
}

function redo() {
  if (!redoStack.length) return;
  const sid = redoStack.pop(); undoStack.push(sid);
  if (undoneStrokes[sid]) { ownStrokes[sid] = undoneStrokes[sid]; undoneStrokes[sid].forEach(l => send(l)); delete undoneStrokes[sid]; }
  redrawAll();
}

function clearCanvas() {
  if (!confirm('Clear for everyone?')) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ownStrokes = {}; undoStack = []; redoStack = []; otherStrokes = {}; undoneStrokes = {};
  send({ type: 'clear' });
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z') { e.preventDefault(); undo(); }
    if (e.key === 'y') { e.preventDefault(); redo(); }
  }
  if (e.key === 'Enter' && chatOpen) sendChat();
});

// ─── Tools ────────────────────────────────────────────────────────────
function selectTool(tool) {
  toolMode = tool;
  document.getElementById('btnPen').classList.toggle('active', tool === 'pen');
  document.getElementById('btnEraser').classList.toggle('active', tool === 'eraser');
  const size = tool === 'eraser' ? eraserSize : penSize;
  document.getElementById('sizeSlider').value = size;
  document.getElementById('sizeVal').textContent = size;
  document.getElementById('sbTool').textContent = tool;
  document.getElementById('sbSize').textContent = size;
}

function selectColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  currentColor = el.dataset.color;
  document.getElementById('colorPicker').value = currentColor;
  if (toolMode === 'eraser') selectTool('pen');
}

function setCustomColor(val) {
  currentColor = val;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  if (toolMode === 'eraser') selectTool('pen');
}

function changeSize(val) {
  const n = parseInt(val);
  if (toolMode === 'eraser') eraserSize = n; else penSize = n;
  document.getElementById('sizeVal').textContent = n;
  document.getElementById('sbSize').textContent = n;
}

// ─── Drawing bubbles ──────────────────────────────────────────────────
function showDrawingBubble(user, x, y) {
  let b = drawingBubbles[user];
  if (!b) { b = document.createElement('div'); b.className = 'draw-bubble'; b.textContent = user; wrap.appendChild(b); drawingBubbles[user] = b; }
  b.style.left = x + 'px'; b.style.top = y + 'px'; b.classList.add('visible');
  clearTimeout(drawingTimers[user]);
  drawingTimers[user] = setTimeout(() => b.classList.remove('visible'), 1500);
}

// ─── Room code copy ───────────────────────────────────────────────────
function copyRoomCode() {
  navigator.clipboard.writeText(roomCode).then(() => {
    const tip = document.getElementById('copiedTip');
    tip.classList.add('show');
    setTimeout(() => tip.classList.remove('show'), 1500);
  });
}

// ─── Toast ────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Chat ─────────────────────────────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatPanel').style.display = chatOpen ? 'flex' : 'none';
  if (chatOpen) { unreadCount = 0; updateUnread(); scrollChat(); }
}

function updateUnread() {
  const el = document.getElementById('chatUnread');
  if (unreadCount > 0) { el.textContent = unreadCount > 9 ? '9+' : unreadCount; el.classList.add('show'); }
  else el.classList.remove('show');
}

function scrollChat() {
  const el = document.getElementById('chatMessages');
  el.scrollTop = el.scrollHeight;
}

function getNow() {
  const d = new Date();
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function appendChatMsg(user, text, time, isOwn) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${isOwn ? 'own' : 'other'}`;
  div.innerHTML = `
    ${!isOwn ? `<div class="chat-msg-user">${user}</div>` : ''}
    <div class="chat-msg-bubble">${escapeHtml(text)}</div>
    <div class="chat-msg-time">${time || getNow()}</div>
  `;
  box.appendChild(div);
  scrollChat();
}

function addSystemMsg(text) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-system-msg';
  div.textContent = text;
  box.appendChild(div);
  scrollChat();
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  send({ type: 'chat', text, time: getNow() });
  input.value = '';
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendChat(); }
});

// ─── Voice Chat (WebRTC) ──────────────────────────────────────────────
async function toggleVoice() {
  if (!voiceOn) await joinVoice();
  else leaveVoice();
}

async function joinVoice() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    voiceOn = true;
    voiceUsers.add(username);
    document.getElementById('btnVoice').classList.add('voice-on');
    document.getElementById('voiceBtnLabel').textContent = 'Leave';
    updateVoiceBar();
    send({ type: 'voice-join' });
    showToast('🎙️ Voice on');
  } catch (e) {
    showToast('Mic access denied');
    console.error(e);
  }
}

function leaveVoice() {
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  for (const u of Object.keys(peerConnections)) closeVoicePeer(u);
  voiceOn = false;
  voiceUsers.delete(username);
  document.getElementById('btnVoice').classList.remove('voice-on');
  document.getElementById('voiceBtnLabel').textContent = 'Voice';
  updateVoiceBar();
  send({ type: 'voice-leave' });
  showToast('🎙️ Voice off');
}

function createPeer(targetUser) {
  if (peerConnections[targetUser]) { peerConnections[targetUser].close(); delete peerConnections[targetUser]; }
  const pc = new RTCPeerConnection(iceConfig);
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = (e) => {
    let audio = document.getElementById('audio-' + targetUser);
    if (!audio) { audio = document.createElement('audio'); audio.id = 'audio-' + targetUser; audio.autoplay = true; audio.playsinline = true; document.body.appendChild(audio); }
    if (e.streams && e.streams[0]) audio.srcObject = e.streams[0];
  };
  pc.onicecandidate = (e) => { if (e.candidate) send({ type: 'webrtc-ice', target: targetUser, candidate: e.candidate }); };
  pc.oniceconnectionstatechange = () => { if (pc.iceConnectionState === 'failed') pc.restartIce(); };
  peerConnections[targetUser] = pc;
  return pc;
}

async function initiateVoiceCall(targetUser) {
  const pc = createPeer(targetUser);
  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    send({ type: 'webrtc-offer', target: targetUser, sdp: offer });
  } catch(e) { console.error('Offer failed:', e); }
}

async function handleOffer(fromUser, sdp) {
  if (!voiceOn) return;
  const pc = createPeer(fromUser);
  try {
    await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    send({ type: 'webrtc-answer', target: fromUser, sdp: answer });
  } catch(e) { console.error('Answer failed:', e); }
}

async function handleAnswer(fromUser, sdp) {
  const pc = peerConnections[fromUser];
  if (pc) { try { await pc.setRemoteDescription(new RTCSessionDescription(sdp)); } catch(e) { console.error(e); } }
}

async function handleIce(fromUser, candidate) {
  const pc = peerConnections[fromUser];
  if (pc && candidate) { try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) { console.error(e); } }
}

function closeVoicePeer(user) {
  if (peerConnections[user]) { peerConnections[user].close(); delete peerConnections[user]; }
  const audio = document.getElementById('audio-' + user);
  if (audio) audio.remove();
}

function updateVoiceBar() {
  const bar = document.getElementById('voiceBar');
  const usersEl = document.getElementById('voiceUsers');
  if (voiceUsers.size === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  usersEl.innerHTML = '';
  for (const u of voiceUsers) {
    const span = document.createElement('span');
    span.className = 'voice-user';
    span.innerHTML = `<div class="voice-user-dot"></div>${u}`;
    usersEl.appendChild(span);
  }
}
